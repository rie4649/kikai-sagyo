<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機械作業</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14264d">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;}
body{background:#eef1f6;margin:0;padding-bottom:60px;font-family:Arial,"Hiragino Sans",sans-serif;}
header{background:#14264d;color:white;padding:20px 10px;text-align:center;position:relative;}
header h1{font-size:26px;margin:0;}
.gear{position:absolute;top:16px;right:16px;background:none;border:none;color:white;font-size:26px;cursor:pointer;}
.installIconBtn{position:absolute;top:16px;left:16px;background:none;border:none;color:white;font-size:26px;cursor:pointer;}
.wrap{max-width:640px;margin:0 auto;padding:16px;}
.reqCard{background:white;border-radius:14px;box-shadow:0 2px 6px rgba(0,0,0,.1);padding:18px;margin-bottom:10px;cursor:pointer;}
.reqTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.reqDate{font-size:18px;color:#444;font-weight:bold;}
.reqClient{font-size:23px;font-weight:bold;color:#222;margin-bottom:6px;}
.reqContent{font-size:16px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty{text-align:center;color:#888;font-size:15px;margin:24px 0;}
.fab{position:fixed;right:20px;bottom:20px;width:60px;height:60px;border-radius:50%;background:#14264d;color:white;border:none;font-size:28px;box-shadow:0 4px 10px rgba(0,0,0,.3);z-index:500;}

.modalScreen{display:none;position:fixed;inset:0;background:#eef1f6;z-index:998;overflow-y:auto;}
.modalScreen.show{display:block;}
.modalHeader{background:#14264d;color:white;padding:18px 10px;text-align:center;position:relative;}
.modalHeader h2{font-size:20px;margin:0;}
.modalClose{position:absolute;top:16px;left:14px;background:none;border:none;color:white;font-size:17px;font-weight:bold;cursor:pointer;}
.modalBox{max-width:640px;margin:20px auto;background:white;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.detailRow{font-size:17px;line-height:1.9;color:#222;margin-bottom:6px;}
.detailRow b{color:#333;}
.shareBtnGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.shareBtn{padding:14px 4px;border:none;border-radius:12px;font-size:14px;font-weight:bold;color:white;}
.shareBtn.line{background:#06c755;}
.shareBtn.print{background:#555;}
.shareBtn.pdf{background:#8e24aa;}
.deleteBtn{width:100%;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:bold;color:white;background:#333;margin-top:8px;}

.settingsScreen{display:none;position:fixed;inset:0;background:#eef1f6;z-index:999;overflow-y:auto;}
.settingsScreen.show{display:block;}
.setHeader{background:#14264d;color:white;padding:18px 10px;text-align:center;position:relative;}
.setHeader h2{font-size:20px;margin:0;}
.closeSet{position:absolute;top:14px;left:14px;background:none;border:none;color:white;font-size:26px;cursor:pointer;}
.box{background:white;margin:16px auto;padding:20px;border-radius:16px;max-width:640px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.field{margin-bottom:18px;}
.field label{display:block;font-size:17px;font-weight:bold;margin-bottom:8px;color:#333;}
.field input[type=text],.field input[type=tel],.field input[type=date],.field input[type=time],.field input[type=number],.field textarea{
width:100%;font-size:19px;padding:13px;border-radius:12px;border:1px solid #aaa;
}
.checkGroup{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.checkGroup label{
display:flex;align-items:center;gap:8px;
background:#eef1f6;border:2px solid #ccc;border-radius:12px;padding:12px 10px;
font-size:16px;font-weight:bold;color:#333;cursor:pointer;
}
.checkGroup input{transform:scale(1.3);}
.checkGroup label.checked{background:#14264d;color:white;border-color:#14264d;}
.emptyNote{color:#888;font-size:14px;margin:4px 0 0;}
.toggleRow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.toggleRow button{padding:14px 6px;border:2px solid #ccc;border-radius:12px;background:#eef1f6;font-size:16px;font-weight:bold;color:#333;}
.toggleRow button.active{background:#14264d;color:white;border-color:#14264d;}
.btnGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
.actionBtn{padding:18px;border:none;border-radius:16px;font-size:19px;font-weight:bold;color:white;}
.save{background:#2e9d45;grid-column:1/3;}
.install{background:#ff9800;}
.clear{background:#e53935;}
.back{background:#888;grid-column:1/3;}
.savedMsg{display:none;background:#e8f8ec;color:#1b7d34;border:2px solid #2e9d45;border-radius:12px;padding:14px;text-align:center;font-size:18px;font-weight:bold;margin-bottom:16px;}
.linkNote{background:#e8ecf4;border:2px solid #14264d;border-radius:12px;padding:12px 14px;font-size:14px;color:#14264d;margin-bottom:16px;line-height:1.6;}

.manageScreen{display:none;position:fixed;inset:0;background:#eef1f6;z-index:999;overflow-y:auto;}
.manageScreen.show{display:block;}
.manageSubTitle{font-size:18px;font-weight:bold;color:#333;margin:0 0 12px;}
.tagList{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.tagChip{display:flex;align-items:center;gap:8px;background:#eef1f6;border:2px solid #14264d;border-radius:999px;padding:8px 8px 8px 16px;font-size:15px;font-weight:bold;color:#333;}
.tagChip button{background:#14264d;color:white;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;line-height:1;cursor:pointer;}
.addRow{display:flex;gap:10px;margin-bottom:24px;}
.addRow input{flex:1;font-size:17px;padding:12px;border-radius:12px;border:1px solid #aaa;}
.addRow button{background:#14264d;color:white;border:none;border-radius:12px;padding:0 18px;font-size:22px;font-weight:bold;cursor:pointer;}
hr.divider{border:none;border-top:2px solid #eee;margin:22px 0;}

.printOnly{display:none;}
@media print{
body *{display:none !important;}
#printBox,#printBox *{display:block !important;}
body{background:white;padding-bottom:0;}
.box{box-shadow:none;border:1px solid #333;}
}
</style>
</head>
<body>
<header>
<button class="installIconBtn" id="installIconBtn" style="display:none;" onclick="installApp()">📲</button>
<h1>🚜 機械作業</h1>
<button class="gear" onclick="openManage()">⚙️</button>
</header>
<div class="wrap">
<div id="requestList"></div>
</div>
<button class="fab" onclick="openSettings()">＋</button>

<div class="modalScreen" id="modalScreen">
<div class="modalHeader">
<button class="modalClose" onclick="closeModal()">← 戻る</button>
<h2>機械作業の詳細</h2>
</div>
<div class="modalBox" id="modalBox"></div>
</div>

<div class="settingsScreen" id="settingsScreen">
<div class="setHeader">
<button class="closeSet" onclick="closeSettings()">←</button>
<h2>予定を追加</h2>
</div>
<div class="box" id="mainBox">
<div class="savedMsg" id="savedMsg">✅ 保存しました（配車ボードにも追加されます）</div>
<div class="linkNote">📋 保存すると配車ボードの「業務」欄にも自動で表示されます。過ぎた回収日の記録は自動的に削除されます。</div>

<div class="field">
<label>回収日</label>
<input type="date" id="moveDate">
</div>

<div class="field">
<label>時間指定（着）</label>
<input type="time" id="arriveTime">
</div>

<div class="field">
<label>会社名</label>
<input type="text" id="companyName" placeholder="例：〇〇建設">
</div>

<div class="field">
<label>引き取り場所</label>
<input type="text" id="pickupPlace" placeholder="例：本社倉庫、〇〇現場など">
</div>

<div class="field">
<label>住所</label>
<input type="text" id="address" placeholder="例：長野県上田市〇〇">
</div>

<div class="field">
<label>部署</label>
<input type="text" id="department" placeholder="例：工事部">
</div>

<div class="field">
<label>担当者</label>
<input type="text" id="contactPerson" placeholder="例：山田様">
</div>

<div class="field">
<label>電話番号</label>
<input type="tel" id="phone" placeholder="例：0268-00-0000">
</div>

<div class="field">
<label>作業内容</label>
<textarea id="workContent" rows="3" placeholder="例：ユンボの積み込み・移動"></textarea>
</div>

<div class="field">
<label>作業員</label>
<div class="checkGroup" id="workerGroup"></div>
<div class="emptyNote" id="workerEmptyNote" style="display:none;">作業員が未登録です。⚙️のリスト管理から追加してください。</div>
</div>

<div class="field">
<label>車</label>
<div class="checkGroup" id="vehicleGroup"></div>
<div class="emptyNote" id="vehicleEmptyNote" style="display:none;">車が未登録です。⚙️のリスト管理から追加してください。</div>
</div>

<div class="field">
<label>回収物</label>
<div class="checkGroup" id="shuhinGroup"></div>
<div class="emptyNote" id="shuhinEmptyNote" style="display:none;">回収物が未登録です。⚙️のリスト管理から追加してください。</div>
</div>

<div class="field">
<label>持ち物（自由記載）</label>
<input type="text" id="belongings" placeholder="例：フレコン3枚、工具一式など">
</div>

<div class="field">
<label>ETC使用</label>
<div class="toggleRow">
<button type="button" id="etcNashiBtn" onclick="selectEtc('なし')">なし</button>
<button type="button" id="etcAriBtn" onclick="selectEtc('あり')">あり</button>
</div>
<div id="etcCountWrap" style="display:none;margin-top:10px;">
<label>枚数</label>
<input type="number" id="etcCount" min="1" value="1">
</div>
</div>

<div class="field">
<label>マニフェスト</label>
<div class="toggleRow">
<button type="button" id="manifestNashiBtn" onclick="selectManifest('なし')">なし</button>
<button type="button" id="manifestAriBtn" onclick="selectManifest('あり')">あり</button>
</div>
</div>

<div class="field">
<label>備考</label>
<textarea id="notesText" rows="3" placeholder="補足事項など"></textarea>
</div>

<div class="btnGrid">
<button class="actionBtn save" onclick="saveRequest()">💾 保存</button>
<button class="actionBtn" style="background:#06c755;" onclick="shareFormLine()">📱 ライン</button>
<button class="actionBtn" style="background:#555;" onclick="printFormOnly()">🖨 印刷</button>
<button class="actionBtn" style="background:#8e24aa;" onclick="exportFormPdf()">📄 PDF</button>
<button class="actionBtn clear" onclick="clearForm()">🗑 入力クリア</button>
<button class="actionBtn install" id="installBtn" style="display:none;" onclick="installApp()">📲 アプリを追加</button>
<button class="actionBtn back" onclick="closeSettings()">← 戻る</button>
</div>
</div>
</div>

<div class="manageScreen" id="manageScreen">
<div class="setHeader">
<button class="closeSet" onclick="closeManage()">←</button>
<h2>リスト管理</h2>
</div>
<div class="box">
<div class="linkNote">⚠️ このリストは配車ボードと共通です。ここで追加・削除すると配車ボード側にも反映されます。</div>
<div class="manageSubTitle">👷 作業員一覧</div>
<div class="tagList" id="workerTagList"></div>
<div class="addRow">
<input type="text" id="newWorkerInput" placeholder="作業員名を入力">
<button onclick="addWorker()">＋</button>
</div>

<hr class="divider">

<div class="manageSubTitle">🚚 車一覧</div>
<div class="tagList" id="vehicleTagList"></div>
<div class="addRow">
<input type="text" id="newVehicleInput" placeholder="車名を入力（例：4t車）">
<button onclick="addVehicle()">＋</button>
</div>

<hr class="divider">

<div class="manageSubTitle">♻️ 回収物一覧</div>
<div class="tagList" id="shuhinTagList"></div>
<div class="addRow">
<input type="text" id="newShuhinInput" placeholder="回収物名を入力（例：古紙、金属くず）">
<button onclick="addShuhin()">＋</button>
</div>

<div class="btnGrid" style="margin-top:10px;">
<button class="actionBtn back" style="grid-column:1/3;" onclick="closeManage()">← 戻る</button>
</div>
</div>
</div>

<div class="box printOnly" id="printBox">
<h2 style="text-align:center;color:#000;font-weight:900;-webkit-print-color-adjust:exact;print-color-adjust:exact;">機械作業票</h2>
<div style="font-size:18px;line-height:2;color:#000;" id="printBoxBody"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const firebaseConfig={
apiKey:"AIzaSyD99MxOMnGplSQjV7830bS7-gdCBSM9DGY",
authDomain:"sekine-store.firebaseapp.com",
projectId:"sekine-store",
storageBucket:"sekine-store.firebasestorage.app",
messagingSenderId:"781856496751",
appId:"1:781856496751:web:e2e1e5de4cd803415a819a"
};
if(!firebase.apps.length){firebase.initializeApp(firebaseConfig);}
const db=firebase.firestore();
const colRef=db.collection("machineMoves");
// 配車ボードと共通のリスト（pickupSettingsコレクション）
const workerListDocRef=db.collection("pickupSettings").doc("collectorList");
const vehicleListDocRef=db.collection("pickupSettings").doc("truckList");
const shuhinListDocRef=db.collection("pickupSettings").doc("shuhinOptions");
// 配車ボードの「業務」コレクション（連携先）
const taskBoardRef=db.collection("taskBoard");

let requestCache=[];
let workerList=[];
let vehicleList=[];
let shuhinList=[];
let selectedEtc="なし";
let selectedManifest="なし";
let currentDetailId=null;

function todayStr(){
const d=new Date();
const y=d.getFullYear();
const m=String(d.getMonth()+1).padStart(2,"0");
const day=String(d.getDate()).padStart(2,"0");
return y+"-"+m+"-"+day;
}

function escapeHtml(s){
return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ==== 作業員・車・回収物リスト（配車ボードと共通）====
function loadLists(){
workerListDocRef.onSnapshot(function(doc){
const data=doc.exists?doc.data():{};
workerList=data.names||[];
renderCheckGroup("workerGroup","workerEmptyNote",workerList);
renderTagList("workerTagList",workerList,removeWorker);
});
vehicleListDocRef.onSnapshot(function(doc){
const data=doc.exists?doc.data():{};
vehicleList=data.names||[];
renderCheckGroup("vehicleGroup","vehicleEmptyNote",vehicleList);
renderTagList("vehicleTagList",vehicleList,removeVehicle);
});
shuhinListDocRef.onSnapshot(function(doc){
const data=doc.exists?doc.data():{};
shuhinList=data.names||[];
renderCheckGroup("shuhinGroup","shuhinEmptyNote",shuhinList);
renderTagList("shuhinTagList",shuhinList,removeShuhin);
});
}

function renderCheckGroup(groupId,noteId,list){
const group=document.getElementById(groupId);
const note=document.getElementById(noteId);
if(list.length===0){
group.innerHTML="";
note.style.display="block";
return;
}
note.style.display="none";
group.innerHTML=list.map(function(name){
return "<label><input type='checkbox' value='"+escapeHtml(name)+"'>"+escapeHtml(name)+"</label>";
}).join("");
group.querySelectorAll("input[type=checkbox]").forEach(function(cb){
cb.addEventListener("change",function(){
cb.closest("label").classList.toggle("checked",cb.checked);
});
});
}

function renderTagList(boxId,list,removeFn){
const box=document.getElementById(boxId);
if(list.length===0){
box.innerHTML="<div class='empty'>未登録です</div>";
return;
}
box.innerHTML=list.map(function(name){
const safe=name.replace(/'/g,"\\'");
return "<div class='tagChip'>"+escapeHtml(name)+"<button onclick=\""+removeFn.name+"('"+safe+"')\">×</button></div>";
}).join("");
}

function addWorker(){
const input=document.getElementById("newWorkerInput");
const val=input.value.trim();
if(!val)return;
if(workerList.includes(val)){input.value="";return;}
workerListDocRef.set({names:firebase.firestore.FieldValue.arrayUnion(val)},{merge:true}).then(function(){
input.value="";
}).catch(function(){alert("追加に失敗しました。通信を確認してください。");});
}
function removeWorker(name){
if(!confirm("「"+name+"」を作業員一覧から削除しますか？（配車ボードでも使われなくなります）"))return;
workerListDocRef.update({names:firebase.firestore.FieldValue.arrayRemove(name)}).catch(function(){alert("削除に失敗しました。通信を確認してください。");});
}
function addVehicle(){
const input=document.getElementById("newVehicleInput");
const val=input.value.trim();
if(!val)return;
if(vehicleList.includes(val)){input.value="";return;}
vehicleListDocRef.set({names:firebase.firestore.FieldValue.arrayUnion(val)},{merge:true}).then(function(){
input.value="";
}).catch(function(){alert("追加に失敗しました。通信を確認してください。");});
}
function removeVehicle(name){
if(!confirm("「"+name+"」を車一覧から削除しますか？（配車ボードでも使われなくなります）"))return;
vehicleListDocRef.update({names:firebase.firestore.FieldValue.arrayRemove(name)}).catch(function(){alert("削除に失敗しました。通信を確認してください。");});
}
function addShuhin(){
const input=document.getElementById("newShuhinInput");
const val=input.value.trim();
if(!val)return;
if(shuhinList.includes(val)){input.value="";return;}
shuhinListDocRef.set({names:firebase.firestore.FieldValue.arrayUnion(val)},{merge:true}).then(function(){
input.value="";
}).catch(function(){alert("追加に失敗しました。通信を確認してください。");});
}
function removeShuhin(name){
if(!confirm("「"+name+"」を回収物一覧から削除しますか？（配車ボードでも使われなくなります）"))return;
shuhinListDocRef.update({names:firebase.firestore.FieldValue.arrayRemove(name)}).catch(function(){alert("削除に失敗しました。通信を確認してください。");});
}

// ==== ETC・マニフェスト トグル ====
function selectEtc(v){
selectedEtc=v;
document.getElementById("etcNashiBtn").classList.toggle("active",v==="なし");
document.getElementById("etcAriBtn").classList.toggle("active",v==="あり");
document.getElementById("etcCountWrap").style.display=(v==="あり")?"block":"none";
}
function selectManifest(v){
selectedManifest=v;
document.getElementById("manifestNashiBtn").classList.toggle("active",v==="なし");
document.getElementById("manifestAriBtn").classList.toggle("active",v==="あり");
}

// ==== 入力データの収集 ====
function collectData(){
const company=document.getElementById("companyName").value.trim();
const workers=Array.from(document.querySelectorAll("#workerGroup input:checked")).map(cb=>cb.value);
const vehicles=Array.from(document.querySelectorAll("#vehicleGroup input:checked")).map(cb=>cb.value);
const shuhinSelected=Array.from(document.querySelectorAll("#shuhinGroup input:checked")).map(cb=>cb.value);
return {
date:document.getElementById("moveDate").value,
arriveTime:document.getElementById("arriveTime").value,
company:company,
pickupPlace:document.getElementById("pickupPlace").value.trim(),
address:document.getElementById("address").value.trim(),
department:document.getElementById("department").value.trim(),
contactPerson:document.getElementById("contactPerson").value.trim(),
phone:document.getElementById("phone").value.trim(),
workContent:document.getElementById("workContent").value.trim(),
workers:workers,
vehicles:vehicles,
shuhinSelected:shuhinSelected,
belongings:document.getElementById("belongings").value.trim(),
etcUse:selectedEtc,
etcCount:selectedEtc==="あり"?Number(document.getElementById("etcCount").value||1):null,
manifestHas:selectedManifest,
notes:document.getElementById("notesText").value.trim()
};
}

function validate(data){
if(!data.company){alert("会社名を入力してください");return false;}
if(!data.date){alert("回収日を入力してください");return false;}
return true;
}

function buildSummaryLines(data){
const lines=[];
if(data.date)lines.push("回収日："+data.date);
if(data.arriveTime)lines.push("時間指定（着）："+data.arriveTime);
lines.push("会社名："+data.company);
if(data.pickupPlace)lines.push("引き取り場所："+data.pickupPlace);
if(data.address)lines.push("住所："+data.address);
if(data.department)lines.push("部署："+data.department);
if(data.contactPerson)lines.push("担当者："+data.contactPerson);
if(data.phone)lines.push("電話番号："+data.phone);
if(data.workContent)lines.push("作業内容："+data.workContent);
if(data.workers && data.workers.length)lines.push("作業員："+data.workers.join("、"));
if(data.vehicles && data.vehicles.length)lines.push("車："+data.vehicles.join("、"));
if(data.shuhinSelected && data.shuhinSelected.length)lines.push("回収物："+data.shuhinSelected.join("、"));
if(data.belongings)lines.push("持ち物："+data.belongings);
lines.push("ETC使用："+(data.etcUse==="あり"?("あり（"+(data.etcCount||1)+"枚）"):"なし"));
lines.push("マニフェスト："+(data.manifestHas||"なし"));
if(data.notes)lines.push("備考："+data.notes);
return lines;
}

function contentPreview(data){
if(data.workContent)return data.workContent;
if(data.vehicles && data.vehicles.length)return data.vehicles.join("、");
return "（内容なし）";
}

// ==== 配車ボードの「業務」への連携 ====
function buildTaskBoardNote(data){
const parts=[];
if(data.arriveTime)parts.push("着："+data.arriveTime);
if(data.pickupPlace)parts.push(data.pickupPlace);
if(data.workContent)parts.push(data.workContent);
if(data.belongings)parts.push("持ち物："+data.belongings);
if(data.notes)parts.push("備考："+data.notes);
return parts.join(" / ");
}

function addToTaskBoard(data){
const taskData={
date:data.date,
taskType:"🚜 機械作業："+data.company,
workers:data.workers||[],
truck:(data.vehicles&&data.vehicles.length)?data.vehicles.join("・"):"",
notes:buildTaskBoardNote(data),
pinned:false,
templateId:null,
createdAtMs:Date.now(),
createdAt:firebase.firestore.FieldValue.serverTimestamp()
};
return taskBoardRef.add(taskData);
}

// ==== 保存 ====
function saveRequest(){
const data=collectData();
if(!validate(data))return;
const record=Object.assign({},data,{
createdAt:firebase.firestore.FieldValue.serverTimestamp(),
createdAtText:new Date().toLocaleString()
});
colRef.add(record).then(function(docRef){
addToTaskBoard(data).then(function(taskDoc){
colRef.doc(docRef.id).update({taskBoardId:taskDoc.id}).catch(function(){});
}).catch(function(){
console.error("配車ボードへの追加に失敗しました");
});
const msg=document.getElementById("savedMsg");
msg.style.display="block";
setTimeout(function(){msg.style.display="none";},2500);
clearForm();
}).catch(function(){
alert("保存に失敗しました。通信を確認してください。");
});
}

function shareFormLine(){
const data=collectData();
if(!validate(data))return;
const text="【機械作業】\n"+buildSummaryLines(data).join("\n");
const url="https://line.me/R/msg/text/?"+encodeURIComponent(text);
window.open(url,"_blank");
}

function printFormOnly(){
const data=collectData();
if(!validate(data))return;
fillPrintBox(data);
window.print();
}

function exportFormPdf(){
const data=collectData();
if(!validate(data))return;
fillPrintBox(data);
runPdfExport(data.company,data.date);
}

document.getElementById("arriveTime").value="";
document.getElementById("companyName").value="";
document.getElementById("pickupPlace").value="";
document.getElementById("address").value="";
document.getElementById("department").value="";
document.getElementById("contactPerson").value="";
document.getElementById("phone").value="";
document.getElementById("workContent").value="";
document.querySelectorAll("#workerGroup input[type=checkbox]").forEach(function(cb){
cb.checked=false;
cb.closest("label").classList.remove("checked");

});
document.querySelectorAll("#shuhinGroup input[type=checkbox]").forEach(function(cb){

// ==== 一覧表示 ====
function renderLists(){
const listBox=document.getElementById("requestList");
const sorted=requestCache.slice().sort(function(a,b){return (a.date||"").localeCompare(b.date||"");});
if(sorted.length===0){
listBox.innerHTML="<div class='empty'>予定されている機械作業はありません</div>";
}else{
listBox.innerHTML=sorted.map(renderCard).join("");
}
}

function renderCard(item){
return "<div class='reqCard' onclick=\"openDetail('"+item.id+"')\">"+
"<div class='reqTop'>"+
"<div class='reqDate'>"+escapeHtml(item.date||"-")+(item.arriveTime?" "+escapeHtml(item.arriveTime):"")+"</div>"+
"</div>"+
"<div class='reqClient'>"+escapeHtml(item.company||"-")+"</div>"+
"<div class='reqContent'>"+escapeHtml(contentPreview(item))+"</div>"+
"</div>";
}

function loadRequests(){
colRef.orderBy("date","asc").onSnapshot(function(snap){
requestCache=[];
snap.forEach(function(doc){
requestCache.push(Object.assign({id:doc.id},doc.data()));
});
renderLists();
checkAutoDelete();
},function(){
document.getElementById("requestList").innerHTML="<div class='empty'>読み込みに失敗しました。通信を確認してください。</div>";
});
}

// ==== 回収日が過ぎたら自動削除 ====
function checkAutoDelete(){
const today=todayStr();
requestCache.forEach(function(item){
if(item.date && item.date<today){
colRef.doc(item.id).delete().then(function(){
if(item.taskBoardId){
taskBoardRef.doc(item.taskBoardId).delete().catch(function(){});
}
}).catch(function(){});
}
});
}

// ==== 詳細モーダル ====
function openDetail(id){
const item=requestCache.find(function(r){return r.id===id;});
if(!item)return;
currentDetailId=id;
const lines=buildSummaryLines(item);
const detailHtml=lines.map(function(line){
const idx=line.indexOf("：");
if(idx===-1)return "<div class='detailRow'>"+escapeHtml(line)+"</div>";
return "<div class='detailRow'><b>"+escapeHtml(line.slice(0,idx+1))+"</b>"+escapeHtml(line.slice(idx+1))+"</div>";
}).join("");
document.getElementById("modalBox").innerHTML=
detailHtml+
"<div class='shareBtnGrid'>"+
"<button class='shareBtn line' onclick=\"shareDetailLine('"+id+"')\">📱 ライン</button>"+
"<button class='shareBtn print' onclick=\"printDetail('"+id+"')\">🖨 印刷</button>"+
"<button class='shareBtn pdf' onclick=\"exportDetailPdf('"+id+"')\">📄 PDF</button>"+
"</div>"+
"<button class='deleteBtn' onclick=\"deleteRequest('"+id+"')\">🗑 この記録を削除（配車ボードの業務も削除されます）</button>";
document.getElementById("modalScreen").classList.add("show");
}

function closeModal(){
document.getElementById("modalScreen").classList.remove("show");
currentDetailId=null;
}

function deleteRequest(id){
if(!confirm("この記録を削除します。配車ボード側の業務も一緒に削除されます。よろしいですか？"))return;
const item=requestCache.find(function(r){return r.id===id;});
colRef.doc(id).delete().then(function(){
if(item && item.taskBoardId){
taskBoardRef.doc(item.taskBoardId).delete().catch(function(){});
}
closeModal();
}).catch(function(){
alert("削除に失敗しました。通信を確認してください。");
});
}

// ==== 詳細画面からの共有 ====
function shareDetailLine(id){
const item=requestCache.find(function(r){return r.id===id;});
if(!item)return;
const text="【機械作業】\n"+buildSummaryLines(item).join("\n");
const url="https://line.me/R/msg/text/?"+encodeURIComponent(text);
window.open(url,"_blank");
}

function fillPrintBox(item){
const lines=buildSummaryLines(item);
document.getElementById("printBoxBody").innerHTML=lines.map(function(line){
const idx=line.indexOf("：");
if(idx===-1)return "<div>"+escapeHtml(line)+"</div>";
const label=line.slice(0,idx+1);
const rest=line.slice(idx+1).replace(/\n/g,"<br>");
return "<div><b>"+escapeHtml(label)+"</b>"+escapeHtml(rest)+"</div>";
}).join("");
}

function printDetail(id){
const item=requestCache.find(function(r){return r.id===id;});
if(!item)return;
fillPrintBox(item);
window.print();
}

function runPdfExport(company,date){
const printBox=document.getElementById("printBox");
const prevDisplay=printBox.style.display;
printBox.style.display="block";
html2canvas(printBox,{scale:2,backgroundColor:"#ffffff"}).then(function(canvas){
printBox.style.display=prevDisplay;
const {jsPDF}=window.jspdf;
const doc=new jsPDF("p","mm","a4");
const pageWidth=doc.internal.pageSize.getWidth();
const imgWidth=pageWidth-20;
const imgHeight=canvas.height*imgWidth/canvas.width;
const imgData=canvas.toDataURL("image/png");
doc.addImage(imgData,"PNG",10,10,imgWidth,imgHeight);
const fileName="機械作業_"+(company||"未記入")+"_"+(date||todayStr())+".pdf";
doc.save(fileName);
}).catch(function(){
printBox.style.display=prevDisplay;
alert("PDFの作成に失敗しました。");
});
}

function exportDetailPdf(id){
const item=requestCache.find(function(r){return r.id===id;});
if(!item)return;
fillPrintBox(item);
runPdfExport(item.company,item.date);
}

document.getElementById("settingsScreen").classList.remove("show");

// ==== PWAインストール ====
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",function(e){
e.preventDefault();
deferredPrompt=e;
const btn=document.getElementById("installBtn");
if(btn)btn.style.display="block";
const iconBtn=document.getElementById("installIconBtn");
if(iconBtn)iconBtn.style.display="block";
});

function installApp(){
if(!deferredPrompt)return;
deferredPrompt.prompt();
deferredPrompt.userChoice.then(function(){
deferredPrompt=null;
const btn=document.getElementById("installBtn");
if(btn)btn.style.display="none";
const iconBtn=document.getElementById("installIconBtn");
if(iconBtn)iconBtn.style.display="none";
});
}

window.addEventListener("appinstalled",function(){
const btn=document.getElementById("installBtn");
if(btn)btn.style.display="none";
const iconBtn=document.getElementById("installIconBtn");
if(iconBtn)iconBtn.style.display="none";
});

document.addEventListener("DOMContentLoaded",function(){
selectEtc("なし");
selectManifest("なし");
loadLists();
loadRequests();
if(window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone){
const btn=document.getElementById("installBtn");
if(btn)btn.style.display="none";
const iconBtn=document.getElementById("installIconBtn");
if(iconBtn)iconBtn.style.display="none";
}
});

if("serviceWorker" in navigator){
window.addEventListener("load",function(){
navigator.serviceWorker.register("service-worker.js").catch(function(){});
});
}
</script>
